name: Daily News Update

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate news
        run: python update_news.py --once

      - name: Upload latest_news.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-data
          path: latest_news.json
          retention-days: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Download news-data artifact
        uses: actions/download-artifact@v4
        with:
          name: news-data

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Send daily report
        env:
          GOATCOUNTER_CODE: ${{ secrets.GOATCOUNTER_CODE }}
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_report.py

  newsletter:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Download news-data artifact
        uses: actions/download-artifact@v4
        with:
          name: news-data

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Send newsletter
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: python send_newsletter.py
